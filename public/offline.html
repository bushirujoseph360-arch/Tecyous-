<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | FIFA World Cup 2026™ United</title>
    <style>
        :root {
            --bg: #050505;
            --primary: #a3e635;
            --zinc-400: #a1a1aa;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
            position: relative;
        }
        .atmosphere {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(163, 230, 53, 0.1), transparent 70%);
            filter: blur(60px);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: rgba(163, 230, 53, 0.1);
            border: 1px solid rgba(163, 230, 53, 0.2);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0 0 1rem;
            font-style: italic;
        }
        p {
            color: var(--zinc-400);
            font-size: 0.875rem;
            line-height: 1.6;
            margin: 0 0 2rem;
        }
        button {
            background: var(--primary);
            color: black;
            border: none;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="atmosphere"></div>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="m2 2 20 20"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></svg>
        </div>
        <h1>Hors-Ligne</h1>
        <p>Il semble que vous ayez perdu votre connexion internet. Ne vous inquiétez pas, le dernier calendrier chargé reste accessible.</p>
        <button onclick="window.location.reload()">Réessayer</button>
    </div>
</body>
</html>
